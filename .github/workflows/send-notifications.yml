name: Send Notifications Cron

on:
  schedule:
    # Run every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  send-notifications:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger notification edge function
        run: |
          curl -X POST \
            "https://atjpjmhumzfpotrkefaz.supabase.co/functions/v1/send-notifications" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.SCHEDULER_SECRET_TOKEN }}" \
            --fail-with-body \
            --max-time 60
        env:
          SCHEDULER_SECRET_TOKEN: ${{ secrets.SCHEDULER_SECRET_TOKEN }}
