name: Send Notifications Cron

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  send-notifications:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger notification edge function
        shell: bash
        run: |
          set -euo pipefail

          URL="https://brqibmeyvmpcghrtkshi.supabase.co/functions/v1/send-streak-reminders"
          echo "POST $URL"

          HTTP_CODE=$(curl --show-error --fail-with-body -sS \
            -o response.txt -w "%{http_code}" \
            -X POST "$URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -d '{}' \
            --max-time 60)

          echo "HTTP status: $HTTP_CODE"
          echo "Response body:"
          cat response.txt

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Request failed"
            exit 1
          fi
