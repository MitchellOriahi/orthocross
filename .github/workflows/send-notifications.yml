name: Send Notifications Cron

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  send-notifications:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger notification edge function
        run: |
          https://<PROJECT_REF>.supabase.co/functions/v1/send-streak-reminders
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            --fail-with-body \
            --max-time 60
