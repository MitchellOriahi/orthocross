name: Send Notifications Cron

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  send-notifications:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger notification edge function
        run: |
          curl -sS -X POST \
            "https://atjpjmhumzfpotrkefaz.supabase.co/functions/v1/send-notifications" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            --fail-with-body \
            --max-time 60
