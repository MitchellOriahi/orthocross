name: Send Notifications Cron

on:
  workflow_dispatch:
  schedule:
    # Run every 5 minutes to check user timezones for 6pm/8pm notifications
    - cron: "*/5 * * * *"

jobs:
  send-notifications:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger notification edge function
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail

          # Use the correct Supabase project URL and function name
          URL="https://atjpjmhumzfpotrkefaz.supabase.co/functions/v1/send-notifications"
          echo "POST $URL"

          HTTP_CODE=$(curl -sS -o response.txt -w "%{http_code}" \
            -X POST "$URL" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: $CRON_SECRET" \
            -d '{}' \
            --max-time 120)

          echo "HTTP status: $HTTP_CODE"
          echo "Response body:"
          cat response.txt

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Request failed"
            exit 1
          fi
